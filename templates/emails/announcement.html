<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { background: #f8fafc; padding: 30px; border-radius: 0 0 10px 10px; }
        .message-box { background: white; border-left: 4px solid #0ea5e9; padding: 15px 20px; margin: 20px 0; border-radius: 0 8px 8px 0; }
        .button { display: inline-block; background: #0ea5e9; color: white; padding: 12px 30px; text-decoration: none; border-radius: 8px; margin: 20px 0; }
        .footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 12px; }
        .meta { color: #64748b; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📢 New Announcement</h1>
        </div>
        <div class="content">
            <p>Hello <strong>{{ user.first_name }} {{ user.last_name }}</strong>,</p>
            <p>A new announcement has been posted by <strong>{{ created_by }}</strong>.</p>

            <div class="message-box">
                <h3 style="margin-top:0;">{{ title }}</h3>
                <p style="margin-bottom:0;">{{ message }}</p>
            </div>

            <p class="meta">Posted on {{ created_at }}</p>

            <center>
                <a href="{{ frontend_url }}/dashboard" class="button">View Dashboard</a>
            </center>

            <p>Best regards,<br><strong>Online Exam System</strong></p>
        </div>
        <div class="footer">
            <p>This is an automated email. Please do not reply.</p>
        </div>
    </div>
</body>
</html>
